# ==========================================================================
# Blufire — per-install configuration template
# Copy to: $BLUFIRE_HOME/config.yaml  or  /etc/blufire/config.yaml
# Secrets live in .env, not here. Reference them with ${VAR} below.
# ==========================================================================

tenant:
  id: "acme-agency"
  display_name: "Acme Agency"
  timezone: "America/Chicago"

paths:
  # Where SQLite DBs live (suppression, send log, consent log)
  data_dir: "/var/lib/blufire/acme"
  log_dir: "/var/log/blufire/acme"

sender:
  name: "Steve Russell"
  company: "Acme Marketing"
  email: "steve@acmemarketing.com"
  reply_to: "steve@acmemarketing.com"
  # CAN-SPAM REQUIREMENT — full mailing address shown in every email footer.
  physical_address: "123 Main St, Suite 200, Dallas, TX 75201"

models:
  default: "claude-sonnet-4-20250514"
  drafting: "claude-sonnet-4-20250514"
  scoring: "claude-haiku-4-5-20251001"

prospect_searches:
  - name: "Roofing Contractors DFW"
    person_titles: ["Owner", "President", "CEO"]
    keywords: ["roofing"]
    locations: ["Dallas, Texas, United States"]
    per_page: 10
  - name: "Fencing Contractors DFW"
    person_titles: ["Owner", "President"]
    keywords: ["fencing"]
    locations: ["Dallas, Texas, United States"]
    per_page: 10
  - name: "HVAC DFW"
    person_titles: ["Owner", "Operations Manager"]
    keywords: ["hvac", "heating cooling"]
    locations: ["Dallas, Texas, United States"]
    per_page: 5

outreach:
  daily_send_cap: 50
  per_domain_daily_cap: 5
  send_window:
    start: "08:00"
    end: "17:00"
    days: ["Mon", "Tue", "Wed", "Thu", "Fri"]
  system_prompt_path: "config/prompts/outreach.md"
  webhook:
    gmail_draft_url: "${MAKE_DRAFT_WEBHOOK_URL}"

compliance:
  unsubscribe_base_url: "${UNSUBSCRIBE_BASE_URL}"
  legal_basis: "legitimate_interest"
  jurisdiction: ["US", "CA"]
  # Optional override; default is paths.data_dir/suppression.sqlite
  # suppression_db: "/var/lib/blufire/acme/suppression.sqlite"
  exclude_eea: true
  run_unsubscribe_server: false

logging:
  level: "INFO"
  format: "json"
  # Default: paths.log_dir/blufire.log
  # file: "/var/log/blufire/acme/blufire.log"
  rotate_max_bytes: 52428800
  rotate_backup_count: 10
