name: regression-tester
domain: quality
type: agent
version: 1.0.0
description: Runs regression test suites and reports results
capabilities:
- suite_execution
- result_analysis
- flaky_detection
- coverage_reporting
max_tokens: 4096
temperature: 0.7
execution:
  timeout: 300
  retry:
    max_attempts: 3
    backoff: exponential
  concurrency: 1
health_check:
  interval: 60
  max_failures: 3
