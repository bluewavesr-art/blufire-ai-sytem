name: architect
domain: core
type: agent
version: 1.0.0
description: Designs system architecture and API contracts
capabilities:
- system_design
- api_design
- documentation
- technical_specs
max_tokens: 4096
temperature: 0.7
execution:
  timeout: 300
  retry:
    max_attempts: 3
    backoff: exponential
  concurrency: 1
health_check:
  interval: 60
  max_failures: 3
