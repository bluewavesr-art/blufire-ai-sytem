name: coordinator
domain: core
type: agent
version: 1.0.0
description: Orchestrates agent workflows and task routing
capabilities:
- task_routing
- workflow_management
- agent_coordination
- priority_scheduling
max_tokens: 4096
temperature: 0.7
execution:
  timeout: 300
  retry:
    max_attempts: 3
    backoff: exponential
  concurrency: 1
health_check:
  interval: 60
  max_failures: 3
