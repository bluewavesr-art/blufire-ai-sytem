name: researcher
domain: core
type: agent
version: 1.0.0
description: Analyzes requirements and researches solutions
capabilities:
- requirement_analysis
- solution_research
- competitive_analysis
- feasibility
model: claude-sonnet-4-20250514
max_tokens: 4096
temperature: 0.7
execution:
  timeout: 300
  retry:
    max_attempts: 3
    backoff: exponential
  concurrency: 1
health_check:
  interval: 60
  max_failures: 3
