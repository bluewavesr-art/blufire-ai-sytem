name: coder
domain: core
type: agent
version: 1.0.0
description: Writes, refactors, and debugs code across languages
capabilities:
- code_generation
- refactoring
- debugging
- multi_language
max_tokens: 4096
temperature: 0.7
execution:
  timeout: 300
  retry:
    max_attempts: 3
    backoff: exponential
  concurrency: 1
health_check:
  interval: 60
  max_failures: 3
