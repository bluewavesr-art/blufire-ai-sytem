name: industry-analyst
domain: research
type: agent
version: 1.0.0
description: Analyzes industry trends and developments
capabilities:
- industry_monitoring
- report_generation
- expert_synthesis
- prediction
max_tokens: 4096
temperature: 0.7
execution:
  timeout: 300
  retry:
    max_attempts: 3
    backoff: exponential
  concurrency: 1
health_check:
  interval: 60
  max_failures: 3
