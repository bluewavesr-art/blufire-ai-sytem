name: survey-agent
domain: research
type: agent
version: 1.0.0
description: Designs and analyzes surveys for research
capabilities:
- survey_design
- distribution
- response_analysis
- statistical_reporting
max_tokens: 4096
temperature: 0.7
execution:
  timeout: 300
  retry:
    max_attempts: 3
    backoff: exponential
  concurrency: 1
health_check:
  interval: 60
  max_failures: 3
