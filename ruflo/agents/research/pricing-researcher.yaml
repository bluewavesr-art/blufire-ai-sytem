name: pricing-researcher
domain: research
type: agent
version: 1.0.0
description: Researches pricing strategies and market rates
capabilities:
- price_benchmarking
- elasticity_analysis
- competitive_pricing
- value_modeling
max_tokens: 4096
temperature: 0.7
execution:
  timeout: 300
  retry:
    max_attempts: 3
    backoff: exponential
  concurrency: 1
health_check:
  interval: 60
  max_failures: 3
