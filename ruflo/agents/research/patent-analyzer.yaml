name: patent-analyzer
domain: research
type: agent
version: 1.0.0
description: Analyzes patent landscapes and IP opportunities
capabilities:
- patent_search
- landscape_analysis
- freedom_to_operate
- filing_recommendations
model: claude-sonnet-4-20250514
max_tokens: 4096
temperature: 0.7
execution:
  timeout: 300
  retry:
    max_attempts: 3
    backoff: exponential
  concurrency: 1
health_check:
  interval: 60
  max_failures: 3
