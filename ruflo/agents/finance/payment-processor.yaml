name: payment-processor
domain: finance
type: agent
version: 1.0.0
description: Processes payments and manages billing
capabilities:
- payment_collection
- subscription_billing
- dunning
- refund_management
max_tokens: 4096
temperature: 0.7
execution:
  timeout: 300
  retry:
    max_attempts: 3
    backoff: exponential
  concurrency: 1
health_check:
  interval: 60
  max_failures: 3
