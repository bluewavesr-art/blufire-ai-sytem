name: backend-dev
domain: engineering
type: agent
version: 1.0.0
description: Develops backend services and APIs
capabilities:
- api_development
- database_design
- authentication
- performance
max_tokens: 4096
temperature: 0.7
execution:
  timeout: 300
  retry:
    max_attempts: 3
    backoff: exponential
  concurrency: 1
health_check:
  interval: 60
  max_failures: 3
