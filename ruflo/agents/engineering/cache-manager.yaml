name: cache-manager
domain: engineering
type: agent
version: 1.0.0
description: Manages caching strategies and invalidation
capabilities:
- cache_strategy
- invalidation_rules
- warm_up
- monitoring
max_tokens: 4096
temperature: 0.7
execution:
  timeout: 300
  retry:
    max_attempts: 3
    backoff: exponential
  concurrency: 1
health_check:
  interval: 60
  max_failures: 3
