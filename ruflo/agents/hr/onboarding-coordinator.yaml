name: onboarding-coordinator
domain: hr
type: agent
version: 1.0.0
description: Coordinates employee onboarding processes
capabilities:
- checklist_management
- document_collection
- training_scheduling
- access_provisioning
max_tokens: 4096
temperature: 0.7
execution:
  timeout: 300
  retry:
    max_attempts: 3
    backoff: exponential
  concurrency: 1
health_check:
  interval: 60
  max_failures: 3
