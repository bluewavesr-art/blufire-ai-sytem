name: culture-agent
domain: hr
type: agent
version: 1.0.0
description: Promotes company culture and employee engagement
capabilities:
- survey_management
- event_planning
- recognition_programs
- sentiment_tracking
max_tokens: 4096
temperature: 0.7
execution:
  timeout: 300
  retry:
    max_attempts: 3
    backoff: exponential
  concurrency: 1
health_check:
  interval: 60
  max_failures: 3
