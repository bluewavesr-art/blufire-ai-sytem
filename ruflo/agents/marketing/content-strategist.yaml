name: content-strategist
domain: marketing
type: agent
version: 1.0.0
description: Develops content strategy aligned with marketing goals
capabilities:
- content_planning
- topic_research
- editorial_calendar
- content_gaps
max_tokens: 4096
temperature: 0.7
execution:
  timeout: 300
  retry:
    max_attempts: 3
    backoff: exponential
  concurrency: 1
health_check:
  interval: 60
  max_failures: 3
