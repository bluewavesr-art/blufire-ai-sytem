name: analytics-reporter
domain: marketing
type: agent
version: 1.0.0
description: Generates marketing analytics reports and insights
capabilities:
- data_collection
- report_generation
- trend_analysis
- roi_calculation
max_tokens: 4096
temperature: 0.7
execution:
  timeout: 300
  retry:
    max_attempts: 3
    backoff: exponential
  concurrency: 1
health_check:
  interval: 60
  max_failures: 3
