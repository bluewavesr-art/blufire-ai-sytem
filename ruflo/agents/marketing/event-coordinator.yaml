name: event-coordinator
domain: marketing
type: agent
version: 1.0.0
description: Plans and coordinates marketing events and webinars
capabilities:
- event_planning
- registration_management
- promotion
- follow_up
max_tokens: 4096
temperature: 0.7
execution:
  timeout: 300
  retry:
    max_attempts: 3
    backoff: exponential
  concurrency: 1
health_check:
  interval: 60
  max_failures: 3
