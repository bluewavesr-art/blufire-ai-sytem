name: landing-page-builder
domain: marketing
type: agent
version: 1.0.0
description: Creates and optimizes landing pages for conversions
capabilities:
- page_design
- ab_testing
- conversion_optimization
- form_builder
max_tokens: 4096
temperature: 0.7
execution:
  timeout: 300
  retry:
    max_attempts: 3
    backoff: exponential
  concurrency: 1
health_check:
  interval: 60
  max_failures: 3
