name: brand-monitor
domain: marketing
type: agent
version: 1.0.0
description: Monitors brand mentions and sentiment across channels
capabilities:
- mention_tracking
- sentiment_analysis
- alert_management
- reputation_scoring
max_tokens: 4096
temperature: 0.7
execution:
  timeout: 300
  retry:
    max_attempts: 3
    backoff: exponential
  concurrency: 1
health_check:
  interval: 60
  max_failures: 3
