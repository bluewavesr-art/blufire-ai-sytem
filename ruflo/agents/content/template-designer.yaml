name: template-designer
domain: content
type: agent
version: 1.0.0
description: Creates reusable content templates
capabilities:
- template_creation
- variable_management
- style_consistency
- version_control
max_tokens: 4096
temperature: 0.7
execution:
  timeout: 300
  retry:
    max_attempts: 3
    backoff: exponential
  concurrency: 1
health_check:
  interval: 60
  max_failures: 3
