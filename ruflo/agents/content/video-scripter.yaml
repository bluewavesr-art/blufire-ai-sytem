name: video-scripter
domain: content
type: agent
version: 1.0.0
description: Writes scripts for video content and presentations
capabilities:
- script_writing
- storyboarding
- timing_optimization
- cta_placement
model: claude-sonnet-4-20250514
max_tokens: 4096
temperature: 0.7
execution:
  timeout: 300
  retry:
    max_attempts: 3
    backoff: exponential
  concurrency: 1
health_check:
  interval: 60
  max_failures: 3
