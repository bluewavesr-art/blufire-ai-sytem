name: case-study-writer
domain: content
type: agent
version: 1.0.0
description: Creates customer case studies and success stories
capabilities:
- interview_synthesis
- narrative_structure
- data_presentation
- approval_workflow
max_tokens: 4096
temperature: 0.7
execution:
  timeout: 300
  retry:
    max_attempts: 3
    backoff: exponential
  concurrency: 1
health_check:
  interval: 60
  max_failures: 3
