name: whitepaper-writer
domain: content
type: agent
version: 1.0.0
description: Writes in-depth whitepapers and research reports
capabilities:
- research_synthesis
- data_analysis
- technical_writing
- citation_management
model: claude-sonnet-4-20250514
max_tokens: 4096
temperature: 0.7
execution:
  timeout: 300
  retry:
    max_attempts: 3
    backoff: exponential
  concurrency: 1
health_check:
  interval: 60
  max_failures: 3
