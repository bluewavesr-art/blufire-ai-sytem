name: press-release-writer
domain: content
type: agent
version: 1.0.0
description: Drafts press releases and media communications
capabilities:
- press_writing
- quote_generation
- distribution_prep
- media_list
model: claude-sonnet-4-20250514
max_tokens: 4096
temperature: 0.7
execution:
  timeout: 300
  retry:
    max_attempts: 3
    backoff: exponential
  concurrency: 1
health_check:
  interval: 60
  max_failures: 3
