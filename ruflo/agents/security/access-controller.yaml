name: access-controller
domain: security
type: agent
version: 1.0.0
description: Manages access control and permissions
capabilities:
- rbac_management
- permission_auditing
- access_review
- policy_enforcement
max_tokens: 4096
temperature: 0.7
execution:
  timeout: 300
  retry:
    max_attempts: 3
    backoff: exponential
  concurrency: 1
health_check:
  interval: 60
  max_failures: 3
