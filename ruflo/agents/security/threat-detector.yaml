name: threat-detector
domain: security
type: agent
version: 1.0.0
description: Detects security threats and anomalies
capabilities:
- anomaly_detection
- threat_classification
- alert_generation
- pattern_matching
model: claude-sonnet-4-20250514
max_tokens: 4096
temperature: 0.7
execution:
  timeout: 300
  retry:
    max_attempts: 3
    backoff: exponential
  concurrency: 1
health_check:
  interval: 60
  max_failures: 3
