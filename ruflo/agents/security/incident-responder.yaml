name: incident-responder
domain: security
type: agent
version: 1.0.0
description: Responds to security incidents and breaches
capabilities:
- incident_triage
- containment
- investigation
- recovery_planning
max_tokens: 4096
temperature: 0.7
execution:
  timeout: 300
  retry:
    max_attempts: 3
    backoff: exponential
  concurrency: 1
health_check:
  interval: 60
  max_failures: 3
