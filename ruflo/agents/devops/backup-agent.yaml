name: backup-agent
domain: devops
type: agent
version: 1.0.0
description: Manages data backups and disaster recovery
capabilities:
- backup_scheduling
- restoration_testing
- retention_management
- dr_planning
max_tokens: 4096
temperature: 0.7
execution:
  timeout: 300
  retry:
    max_attempts: 3
    backoff: exponential
  concurrency: 1
health_check:
  interval: 60
  max_failures: 3
