name: log-analyzer
domain: devops
type: agent
version: 1.0.0
description: Analyzes logs for errors and patterns
capabilities:
- log_parsing
- pattern_detection
- error_correlation
- alert_generation
max_tokens: 4096
temperature: 0.7
execution:
  timeout: 300
  retry:
    max_attempts: 3
    backoff: exponential
  concurrency: 1
health_check:
  interval: 60
  max_failures: 3
