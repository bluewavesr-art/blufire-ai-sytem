name: funnel-optimizer
domain: analytics
type: agent
version: 1.0.0
description: Analyzes and optimizes conversion funnels
capabilities:
- funnel_mapping
- drop_off_analysis
- optimization_suggestions
- impact_estimation
max_tokens: 4096
temperature: 0.7
execution:
  timeout: 300
  retry:
    max_attempts: 3
    backoff: exponential
  concurrency: 1
health_check:
  interval: 60
  max_failures: 3
