name: dashboard-builder
domain: analytics
type: agent
version: 1.0.0
description: Creates and maintains analytics dashboards
capabilities:
- widget_design
- data_binding
- layout_management
- refresh_scheduling
max_tokens: 4096
temperature: 0.7
execution:
  timeout: 300
  retry:
    max_attempts: 3
    backoff: exponential
  concurrency: 1
health_check:
  interval: 60
  max_failures: 3
