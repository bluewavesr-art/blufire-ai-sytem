name: ab-test-analyzer
domain: analytics
type: agent
version: 1.0.0
description: Analyzes A/B test results with statistical rigor
capabilities:
- statistical_testing
- significance_calculation
- sample_size_estimation
- recommendation
model: claude-sonnet-4-20250514
max_tokens: 4096
temperature: 0.7
execution:
  timeout: 300
  retry:
    max_attempts: 3
    backoff: exponential
  concurrency: 1
health_check:
  interval: 60
  max_failures: 3
