name: metrics-tracker
domain: analytics
type: agent
version: 1.0.0
description: Tracks KPIs and business metrics in real-time
capabilities:
- kpi_monitoring
- threshold_alerts
- trend_detection
- dashboard_updates
model: claude-sonnet-4-20250514
max_tokens: 4096
temperature: 0.7
execution:
  timeout: 300
  retry:
    max_attempts: 3
    backoff: exponential
  concurrency: 1
health_check:
  interval: 60
  max_failures: 3
