name: proposal-writer
domain: sales
type: agent
version: 1.0.0
description: Generates customized proposals and quotes
capabilities:
- proposal_generation
- pricing_calculation
- template_management
- customization
max_tokens: 4096
temperature: 0.7
execution:
  timeout: 300
  retry:
    max_attempts: 3
    backoff: exponential
  concurrency: 1
health_check:
  interval: 60
  max_failures: 3
