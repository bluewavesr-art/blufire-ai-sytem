name: lead-scorer
domain: sales
type: agent
version: 1.0.0
description: AI-powered lead scoring based on fit and intent signals
capabilities:
- scoring_models
- intent_detection
- fit_analysis
- predictive_scoring
max_tokens: 4096
temperature: 0.7
execution:
  timeout: 300
  retry:
    max_attempts: 3
    backoff: exponential
  concurrency: 1
health_check:
  interval: 60
  max_failures: 3
