name: deal-creator
domain: sales
type: agent
version: 1.0.0
description: Creates and configures new deals in CRM pipeline
capabilities:
- deal_creation
- pipeline_management
- stage_assignment
- value_estimation
max_tokens: 4096
temperature: 0.7
execution:
  timeout: 300
  retry:
    max_attempts: 3
    backoff: exponential
  concurrency: 1
health_check:
  interval: 60
  max_failures: 3
