name: lead-prospector
domain: sales
type: agent
version: 1.0.0
description: Identifies and qualifies potential leads from multiple sources
capabilities:
- apollo_search
- lead_scoring
- prospect_identification
- data_enrichment
model: claude-sonnet-4-20250514
max_tokens: 4096
temperature: 0.7
execution:
  timeout: 300
  retry:
    max_attempts: 3
    backoff: exponential
  concurrency: 1
health_check:
  interval: 60
  max_failures: 3
