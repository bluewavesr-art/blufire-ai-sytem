name: contract-manager
domain: sales
type: agent
version: 1.0.0
description: Manages contract creation, review, and signing workflows
capabilities:
- contract_generation
- review_workflow
- e_signature
- compliance_check
max_tokens: 4096
temperature: 0.7
execution:
  timeout: 300
  retry:
    max_attempts: 3
    backoff: exponential
  concurrency: 1
health_check:
  interval: 60
  max_failures: 3
