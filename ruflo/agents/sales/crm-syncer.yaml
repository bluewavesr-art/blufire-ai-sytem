name: crm-syncer
domain: sales
type: agent
version: 1.0.0
description: Synchronizes data across CRM and external platforms
capabilities:
- hubspot_sync
- data_mapping
- conflict_resolution
- bulk_operations
max_tokens: 4096
temperature: 0.7
execution:
  timeout: 300
  retry:
    max_attempts: 3
    backoff: exponential
  concurrency: 1
health_check:
  interval: 60
  max_failures: 3
