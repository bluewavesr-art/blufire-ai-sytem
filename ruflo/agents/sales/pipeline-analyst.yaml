name: pipeline-analyst
domain: sales
type: agent
version: 1.0.0
description: Analyzes pipeline health and forecasts revenue
capabilities:
- pipeline_analysis
- revenue_forecasting
- bottleneck_detection
- win_rate_analysis
model: claude-sonnet-4-20250514
max_tokens: 4096
temperature: 0.7
execution:
  timeout: 300
  retry:
    max_attempts: 3
    backoff: exponential
  concurrency: 1
health_check:
  interval: 60
  max_failures: 3
