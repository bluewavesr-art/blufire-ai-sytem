name: competitor-tracker
domain: sales
type: agent
version: 1.0.0
description: Monitors competitor activities and market positioning
capabilities:
- competitor_monitoring
- market_intelligence
- pricing_comparison
- feature_tracking
model: claude-sonnet-4-20250514
max_tokens: 4096
temperature: 0.7
execution:
  timeout: 300
  retry:
    max_attempts: 3
    backoff: exponential
  concurrency: 1
health_check:
  interval: 60
  max_failures: 3
