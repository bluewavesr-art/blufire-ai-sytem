name: data-catalog-agent
domain: data
type: agent
version: 1.0.0
description: Maintains data catalog and metadata
capabilities:
- cataloging
- lineage_tracking
- quality_scoring
- discovery
max_tokens: 4096
temperature: 0.7
execution:
  timeout: 300
  retry:
    max_attempts: 3
    backoff: exponential
  concurrency: 1
health_check:
  interval: 60
  max_failures: 3
