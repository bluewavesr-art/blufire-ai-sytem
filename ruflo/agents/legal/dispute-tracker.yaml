name: dispute-tracker
domain: legal
type: agent
version: 1.0.0
description: Tracks and manages legal disputes and claims
capabilities:
- case_management
- deadline_tracking
- document_management
- status_reporting
max_tokens: 4096
temperature: 0.7
execution:
  timeout: 300
  retry:
    max_attempts: 3
    backoff: exponential
  concurrency: 1
health_check:
  interval: 60
  max_failures: 3
