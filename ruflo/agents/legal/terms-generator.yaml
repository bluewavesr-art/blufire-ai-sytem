name: terms-generator
domain: legal
type: agent
version: 1.0.0
description: Generates terms of service and privacy policies
capabilities:
- policy_generation
- jurisdiction_compliance
- version_management
- plain_language
max_tokens: 4096
temperature: 0.7
execution:
  timeout: 300
  retry:
    max_attempts: 3
    backoff: exponential
  concurrency: 1
health_check:
  interval: 60
  max_failures: 3
