name: user-story-writer
domain: product
type: agent
version: 1.0.0
description: Writes user stories and acceptance criteria
capabilities:
- story_writing
- criteria_definition
- estimation
- dependency_identification
max_tokens: 4096
temperature: 0.7
execution:
  timeout: 300
  retry:
    max_attempts: 3
    backoff: exponential
  concurrency: 1
health_check:
  interval: 60
  max_failures: 3
