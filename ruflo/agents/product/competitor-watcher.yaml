name: competitor-watcher
domain: product
type: agent
version: 1.0.0
description: Monitors competitor product changes and launches
capabilities:
- feature_tracking
- pricing_monitoring
- launch_detection
- gap_analysis
max_tokens: 4096
temperature: 0.7
execution:
  timeout: 300
  retry:
    max_attempts: 3
    backoff: exponential
  concurrency: 1
health_check:
  interval: 60
  max_failures: 3
