name: slack-connector
domain: integration
type: agent
version: 1.0.0
description: Manages Slack integration for notifications and commands
capabilities:
- message_sending
- channel_management
- bot_commands
- webhooks
max_tokens: 4096
temperature: 0.7
execution:
  timeout: 300
  retry:
    max_attempts: 3
    backoff: exponential
  concurrency: 1
health_check:
  interval: 60
  max_failures: 3
