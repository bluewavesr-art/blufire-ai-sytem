name: api-gateway
domain: integration
type: agent
version: 1.0.0
description: Manages API gateway routing and rate limiting
capabilities:
- route_management
- rate_limiting
- authentication
- logging
max_tokens: 4096
temperature: 0.7
execution:
  timeout: 300
  retry:
    max_attempts: 3
    backoff: exponential
  concurrency: 1
health_check:
  interval: 60
  max_failures: 3
