name: gmail-connector
domain: integration
type: agent
version: 1.0.0
description: Manages Gmail SMTP integration for email delivery
capabilities:
- email_sending
- template_management
- tracking
- bounce_handling
max_tokens: 4096
temperature: 0.7
execution:
  timeout: 300
  retry:
    max_attempts: 3
    backoff: exponential
  concurrency: 1
health_check:
  interval: 60
  max_failures: 3
