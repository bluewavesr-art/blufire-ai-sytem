name: hubspot-connector
domain: integration
type: agent
version: 1.0.0
description: Manages HubSpot CRM integration and data sync
capabilities:
- contact_sync
- deal_management
- workflow_triggers
- property_mapping
max_tokens: 4096
temperature: 0.7
execution:
  timeout: 300
  retry:
    max_attempts: 3
    backoff: exponential
  concurrency: 1
health_check:
  interval: 60
  max_failures: 3
