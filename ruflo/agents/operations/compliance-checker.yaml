name: compliance-checker
domain: operations
type: agent
version: 1.0.0
description: Checks operations for regulatory compliance
capabilities:
- regulation_tracking
- audit_preparation
- gap_analysis
- remediation_planning
max_tokens: 4096
temperature: 0.7
execution:
  timeout: 300
  retry:
    max_attempts: 3
    backoff: exponential
  concurrency: 1
health_check:
  interval: 60
  max_failures: 3
