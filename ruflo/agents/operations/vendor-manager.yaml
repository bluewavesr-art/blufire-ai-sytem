name: vendor-manager
domain: operations
type: agent
version: 1.0.0
description: Manages vendor relationships and procurement
capabilities:
- vendor_evaluation
- contract_tracking
- performance_monitoring
- cost_optimization
model: claude-sonnet-4-20250514
max_tokens: 4096
temperature: 0.7
execution:
  timeout: 300
  retry:
    max_attempts: 3
    backoff: exponential
  concurrency: 1
health_check:
  interval: 60
  max_failures: 3
