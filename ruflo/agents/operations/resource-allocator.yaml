name: resource-allocator
domain: operations
type: agent
version: 1.0.0
description: Allocates resources across teams and projects
capabilities:
- capacity_planning
- allocation_optimization
- conflict_resolution
- utilization_tracking
max_tokens: 4096
temperature: 0.7
execution:
  timeout: 300
  retry:
    max_attempts: 3
    backoff: exponential
  concurrency: 1
health_check:
  interval: 60
  max_failures: 3
