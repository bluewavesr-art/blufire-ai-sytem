name: chat-responder
domain: support
type: agent
version: 1.0.0
description: Handles real-time chat support inquiries
capabilities:
- live_chat
- response_generation
- context_awareness
- handoff_management
model: claude-sonnet-4-20250514
max_tokens: 4096
temperature: 0.7
execution:
  timeout: 300
  retry:
    max_attempts: 3
    backoff: exponential
  concurrency: 1
health_check:
  interval: 60
  max_failures: 3
