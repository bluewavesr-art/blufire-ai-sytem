name: knowledge-base-agent
domain: support
type: agent
version: 1.0.0
description: Maintains and searches knowledge base for answers
capabilities:
- article_search
- content_creation
- gap_identification
- version_management
model: claude-sonnet-4-20250514
max_tokens: 4096
temperature: 0.7
execution:
  timeout: 300
  retry:
    max_attempts: 3
    backoff: exponential
  concurrency: 1
health_check:
  interval: 60
  max_failures: 3
