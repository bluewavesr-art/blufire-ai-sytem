name: escalation-manager
domain: support
type: agent
version: 1.0.0
description: Manages escalation paths and SLA compliance
capabilities:
- escalation_routing
- sla_monitoring
- priority_override
- notification_management
max_tokens: 4096
temperature: 0.7
execution:
  timeout: 300
  retry:
    max_attempts: 3
    backoff: exponential
  concurrency: 1
health_check:
  interval: 60
  max_failures: 3
